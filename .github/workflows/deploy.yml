name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      run_id:
        description: "CI workflow run ID to deploy (leave blank for latest)"
        required: false

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    name: Deploy to Server
    runs-on: self-hosted
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Resolve run ID
        id: resolve
        run: |
          if [ -n "${{ github.event.inputs.run_id }}" ]; then
            echo "run_id=${{ github.event.inputs.run_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts from CI
        uses: actions/download-artifact@v8
        with:
          name: wasm-build
          path: dist/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.resolve.outputs.run_id }}

      - name: Deploy to web root
        run: |
          # Files go into the mino/ subdirectory so nginx can use root /srv/www/mino
          # with location ^~ /mino/ — no alias needed, avoiding the alias+try_files bug.
          sudo mkdir -p /srv/www/mino
          sudo rsync -a --delete dist/ /srv/www/mino/

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WASM_MAX_RAW_BYTES: 280000
  WASM_MAX_GZIP_BYTES: 130000

jobs:
  check:
    name: Check, Fmt & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --target wasm32-unknown-unknown -- -D warnings

      - name: cargo test (host)
        run: cargo test --lib

  build:
    name: WASM Build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: trunk build --release
        run: trunk build --release

      - name: Check WASM size budget
        run: |
          set -euo pipefail
          wasm_file="$(find dist -maxdepth 1 -type f -name '*_bg.wasm' | head -n 1)"
          js_file="$(find dist -maxdepth 1 -type f -name '*.js' | head -n 1)"

          if [ -z "${wasm_file}" ]; then
            echo "No wasm artifact found in dist/"
            exit 1
          fi

          wasm_raw_bytes="$(stat -c %s "${wasm_file}")"
          wasm_gzip_bytes="$(gzip -c "${wasm_file}" | wc -c | tr -d ' ')"

          if [ -n "${js_file}" ]; then
            js_raw_bytes="$(stat -c %s "${js_file}")"
            js_gzip_bytes="$(gzip -c "${js_file}" | wc -c | tr -d ' ')"
          else
            js_raw_bytes="N/A"
            js_gzip_bytes="N/A"
          fi

          {
            echo "## WASM size report"
            echo ""
            echo "| Artifact | Raw bytes | Gzip bytes |"
            echo "|---|---:|---:|"
            echo "| ${wasm_file} | ${wasm_raw_bytes} | ${wasm_gzip_bytes} |"
            echo "| ${js_file:-N/A} | ${js_raw_bytes} | ${js_gzip_bytes} |"
            echo ""
            echo "Budget: wasm raw <= ${WASM_MAX_RAW_BYTES}, wasm gzip <= ${WASM_MAX_GZIP_BYTES}"
          } >> "${GITHUB_STEP_SUMMARY}"

          if [ "${wasm_raw_bytes}" -gt "${WASM_MAX_RAW_BYTES}" ]; then
            echo "WASM raw size budget exceeded: ${wasm_raw_bytes} > ${WASM_MAX_RAW_BYTES}"
            exit 1
          fi

          if [ "${wasm_gzip_bytes}" -gt "${WASM_MAX_GZIP_BYTES}" ]; then
            echo "WASM gzip size budget exceeded: ${wasm_gzip_bytes} > ${WASM_MAX_GZIP_BYTES}"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: wasm-build
          path: dist/
          retention-days: 30
